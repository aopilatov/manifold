services:
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]   # AOF: durability recovery-окна
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  # Движок (после сборки образа). Для dev обычно запускается через `just server`.
  server:
    build: .
    depends_on:
      - redis
    environment:
      SOCKET_CONFIG: /app/config.toml
      JWT_HMAC_SECRET: ${JWT_HMAC_SECRET:-dev-secret}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin}
      API_KEY_BACKEND: ${API_KEY_BACKEND:-dev-backend-key}
      API_KEY_PUBLISHER: ${API_KEY_PUBLISHER:-dev-publisher-key}
    ports:
      - "8000:8000"   # ws
      - "8001:8001"   # http api
      - "8002:8002"   # grpc api
      - "8003:8003"   # admin
      - "8004:8004"   # health
    profiles: ["full"]   # docker compose --profile full up

volumes:
  redis-data:
