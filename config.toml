# Конфиг движка. Секреты — через ${ENV_VAR} (раскрываются при загрузке).
# Полное описание полей — docs/architecture.md.

strict_namespaces = true          # канал без известного namespace → отказ

# ──────────────────────────────────────────────
#  Сервер и транспорты
# ──────────────────────────────────────────────
[server]
node_name = "socket-1"
log_level = "info"

[server.ws]
listen           = "0.0.0.0:8000"
path             = "/connection/websocket"
max_message_size = "65536"
ping_interval    = "25s"

[server.sse]                       # SSE-фолбэк (делит HTTP-сервер)
enabled   = true
path      = "/connection/sse"
emit_path = "/connection/sse/emit"

[server.http_api]
listen = "0.0.0.0:8001"
path   = "/api"

[server.grpc_api]
listen = "0.0.0.0:8002"

[server.admin]
listen   = "127.0.0.1:8003"
enabled  = true
auth     = "password"            # password | oidc
password = "${ADMIN_PASSWORD}"

[server.health]
listen = "0.0.0.0:8004"          # /health, /ready

[server.security]
allowed_origins        = ["https://app.example.com"]
cors_allowed_origins   = ["https://app.example.com"]
cors_allow_credentials = true
trusted_proxies        = ["10.0.0.0/8", "127.0.0.1/32"]
ip_allow               = []
ip_deny                = []

[server.conn_limits]
max_connections          = 0
max_connections_per_ip   = 100
max_connections_per_user = 0
require_subprotocol      = true

[server.tls]
enabled   = false
cert_path = "/etc/socket/tls/cert.pem"
key_path  = "/etc/socket/tls/key.pem"

# ──────────────────────────────────────────────
#  Брокер
# ──────────────────────────────────────────────
[redis]
enabled         = false          # true → мультинода (RedisBroker); false → одна нода (память)
url             = "redis://127.0.0.1:6379"
prefix          = "socket"
idempotency_ttl = "5m"

# ──────────────────────────────────────────────
#  Проверка клиентских JWT (выдаёт внешний бэкенд)
# ──────────────────────────────────────────────
[auth.jwt]
algorithm      = "HS256"
hmac_secret    = "${JWT_HMAC_SECRET}"
audience       = "socket"
channels_claim = "channels"

# ──────────────────────────────────────────────
#  Ключи Server API (server-to-server)
# ──────────────────────────────────────────────
[[api_keys]]
key   = "${API_KEY_BACKEND}"
allow = ["publish","broadcast","presence","history","subscribe",
         "unsubscribe","disconnect","user_online","channels","info"]

[[api_keys]]
key   = "${API_KEY_PUBLISHER}"
allow = ["publish","broadcast"]

# ──────────────────────────────────────────────
#  Дефолты и namespaces
# ──────────────────────────────────────────────
[defaults]
presence        = false
join_leave      = false
history_size    = 0
history_ttl     = "0s"
max_subscribers = 0
name_max_len    = 255
[defaults.access]
subscribe = "token"
publish   = "off"
presence  = "token"
history   = "token"

[limits]
max_channels_per_connection = 1000
max_commands_per_second     = 100

[namespaces.news]
history_size = 100
history_ttl  = "10m"
[namespaces.news.access]
subscribe = "public"
publish   = "off"
presence  = "public"
history   = "public"

[namespaces.chat]
presence        = true
join_leave      = true
history_size    = 300
history_ttl     = "24h"
max_subscribers = 5000
[namespaces.chat.access]
subscribe = "token"
publish   = "token"
presence  = "token"
history   = "token"
[namespaces.chat.rate_limit]
publish   = { rate = 20, burst = 40, scope = "client" }
subscribe = { rate = 10, burst = 10, scope = "client" }

[namespaces.user]
history_size = 50
history_ttl  = "72h"
[namespaces.user.access]
subscribe = "token"
publish   = "off"
presence  = "off"
history   = "token"

# ──────────────────────────────────────────────
#  Операционка
# ──────────────────────────────────────────────
[shutdown]
drain_timeout    = "30s"
reconnect_advice = true

[events]                           # опц. уведомления бэкенда о жизненном цикле
enabled   = false
endpoint  = "https://app.example.com/socket/events"
types     = ["connected", "disconnected", "subscribed", "unsubscribed"]
transport = "http"

[telemetry]
log_format      = "json"
tracing_enabled = false
otlp_endpoint   = "http://localhost:4317"
